<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Services Booking Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .form-container {
            max-width: 400px;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .form-heading {
            text-align: center;
            margin-bottom: 20px;
        }
        .form-label {
            font-weight: bold;
            text-align: left;
        }
        .form-input {
            width: calc(100% - 22px);
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 3px;
        }
        .form-button {
            background-color: #24b67e;
            color: #ffffff;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            width: 100%;
        }
        .create-account {
            text-align: center;
            margin-top: 20px;
        }
        .create-account a {
            color: #000dff;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <form action="http://localhost/contacts/form.php" method="post"></form>
    <div class="form-container">
        <h2 class="form-heading">Login</h2>
        <form id="User_Info">
            <label class="form-label" for="User Name">User Name</label>
            <input class="form-input" type="text" id="User Name" required>

            <label class="form-label" for="password">Password</label>
            <input class="form-input" type="password" id="password" required>

            <button class="form-button" type="Enter">Enter</button>
        </form>
        <div class="create-account">
            <p>New To Pawlax? <a href="file:///C:/xampp/htdocs/contacts/Create%20Account.html">Create Your Account</a></p>
        </div>
    </div>
</body>
</html>
